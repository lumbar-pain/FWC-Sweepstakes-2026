<!doctype html>
<html lang="en">
<head>

<title>FWC Sweepstakes 2026</title>
<style>
:root{--bg1:#0c1223;--bg2:#10284a;--gold:#f5b528;--red:#e63a40;--green:#13a86b;--amber:#e3a300;--loss:#d83b3b;--card:#f8faff;--ink:#111827;--muted:#344563;--line:#d7e1f0}*{box-sizing:border-box}body{margin:0;background:#09101f;font-family:"Segoe UI","Noto Sans","Arial Unicode MS",Arial,sans-serif;color:white}.app{display:grid;grid-template-columns:92px minmax(0,1fr);min-height:100vh}.sideNav{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,#060b16,#0d1b34);display:flex;flex-direction:column;align-items:center;gap:12px;padding:18px 10px;border-right:1px solid #ffffff1f;z-index:10}.brand{width:56px;height:56px;border-radius:18px;background:var(--gold);color:#10182d;display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:20px;margin-bottom:10px}.navBtn{width:68px;min-height:62px;border:0;border-radius:18px;background:#ffffff14;color:#c5d6ed;font-weight:900;font-size:10.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}.navBtn span{font-size:21px}.navBtn.active{background:var(--gold);color:#10182d}.main{background:linear-gradient(180deg,var(--bg1),var(--bg2));min-height:100vh}.wrap{max-width:1080px;margin:0 auto;padding:34px 34px 54px}h1{font-size:54px;line-height:1;margin:0 0 26px;font-weight:1000;letter-spacing:-1px}.view{display:none}.view.active{display:block}.sec{font-size:32px;font-weight:1000;margin:30px 0 10px}.datebar{height:56px;border-radius:20px;background:var(--gold);color:#10182d;display:flex;align-items:center;justify-content:space-between;padding:0 22px;margin:18px 0;font-weight:1000}.datebar b{font-size:32px}.card{min-height:166px;border-radius:26px;background:var(--card);color:var(--ink);margin:0 0 16px;border:2px solid var(--line);position:relative;display:grid;grid-template-columns:1fr 112px 1fr;align-items:center;padding:56px 22px 18px;box-shadow:0 4px 14px #0005}.time{position:absolute;left:22px;top:16px;background:#142346;color:white;border-radius:16px;padding:7px 16px;font-weight:1000}.tag{position:absolute;right:22px;top:16px;background:#1e4278;color:white;border-radius:16px;padding:7px 16px;font-weight:1000}.tag.FINAL{background:#526173}.tag.LIVE{background:#d83b3b}.side{display:flex;align-items:center;gap:16px;min-width:0}.right{flex-direction:row-reverse;text-align:right}.flag{width:122px;height:76px;border:2px solid #ddd;border-radius:10px;background:white;object-fit:cover;flex:0 0 auto}.tbdFlag{width:122px;height:76px;border:2px dashed #b9c7dd;border-radius:10px;background:#eef3fb;color:#5a6b84;display:flex;align-items:center;justify-content:center;font-weight:1000;flex:0 0 auto}.team{font-size:29px;font-weight:1000;line-height:1.04}.coach{font-size:29px;color:var(--muted);font-weight:1000;margin-top:6px}.score{background:#e63a40;color:white;border-radius:24px;width:100px;height:78px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:1000;justify-self:center}.score.final{background:#142346}.score.live{background:#d83b3b}.result{font-size:20px;font-weight:1000;margin-top:6px}.win{color:var(--green)}.draw{color:var(--amber)}.loss{color:var(--loss)}.leaderHeader{display:grid;grid-template-columns:1.25fr repeat(5,.55fr);gap:10px;color:#c5d6ed;font-weight:1000;padding:0 16px;margin-top:18px}.leaderRow{display:grid;grid-template-columns:1.25fr repeat(5,.55fr);gap:10px;align-items:center;background:#ffffff17;border:1px solid #ffffff29;border-radius:18px;padding:15px 16px;margin:10px 0}.rank{display:flex;gap:12px;align-items:center}.rankBadge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--gold);color:#10182d;font-weight:1000}.coachName{font-size:22px;font-weight:1000}.pts{font-size:26px;color:var(--gold);font-weight:1000}.dataPanel{max-width:760px;margin:24px auto;background:#f8faff;color:#111827;border-radius:28px;padding:24px;border:2px solid #d7e1f0;box-shadow:0 12px 40px #0006}.dataPanel h2{margin:0 0 8px;color:#111827}.dataPanel p{color:#344563;line-height:1.4}.sourceBox{background:white;border:1px solid #d7e1f0;border-radius:20px;padding:18px;margin-top:16px}.sourceBox label{font-weight:1000;display:block;margin-bottom:8px}.sourceBox input{width:100%;padding:13px;border-radius:14px;border:2px solid #c8d6ea;font-size:15px}.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn{border:0;border-radius:14px;background:var(--gold);color:#10182d;font-weight:1000;font-size:16px;padding:13px;cursor:pointer}.btn.secondary{background:#dbe8ff}.status{margin-top:14px;border-radius:16px;background:#10284a;color:#dbe8ff;padding:12px;font-size:14px}.placeholder{background:#ffffff14;border:1px solid #ffffff29;border-radius:22px;padding:22px;color:#dbe8ff;font-size:18px}@media(max-width:760px){.app{grid-template-columns:1fr}.sideNav{position:fixed;left:0;right:0;bottom:0;top:auto;height:76px;flex-direction:row;padding:8px;justify-content:space-around;border-right:0;border-top:1px solid #ffffff1f;overflow-x:auto}.brand{display:none}.navBtn{width:24%;min-width:64px;min-height:56px}.main{padding-bottom:78px}.wrap{padding:18px 12px 30px}h1{font-size:32px;margin-bottom:22px}.sec{font-size:22px}.datebar{height:44px;border-radius:15px;padding:0 14px}.datebar b{font-size:20px}.card{grid-template-columns:1fr 56px 1fr;min-height:124px;border-radius:18px;padding:42px 9px 10px}.time,.tag{font-size:11px;padding:6px 9px;top:10px}.time{left:9px}.tag{right:9px}.flag,.tbdFlag{width:54px;height:36px;font-size:11px}.side{gap:6px}.team{font-size:13px}.coach{font-size:14px}.score{width:52px;height:48px;font-size:16px;border-radius:16px}.result{font-size:11px}.leaderHeader{grid-template-columns:1fr repeat(5,.45fr);font-size:12px;padding:0 8px}.leaderRow{grid-template-columns:1fr repeat(5,.45fr);font-size:12px;padding:12px 8px}.rankBadge{width:24px;height:24px;font-size:11px}.coachName{font-size:14px}.pts{font-size:18px}.dataPanel{margin:14px 0;padding:16px}.btnrow{grid-template-columns:1fr}}
</style></head>
<body><div class="app"><nav class="sideNav"><div class="brand">FWC</div><button type="button" class="navBtn active" data-view="sweepstake"><span>⚽</span>Sweep</button><button type="button" class="navBtn" data-view="historical"><span>📜</span>History</button><button type="button" class="navBtn" data-view="leaderboard"><span>🏆</span>Leader</button><button type="button" class="navBtn" data-view="data"><span>🔄</span>Data</button></nav><main class="main"><div class="wrap"><h1>FWC Sweepstakes 2026</h1><section id="sweepstake" class="view active"><div id="sweepstakeCards" class="placeholder">Loading latest sheet…</div></section><section id="historical" class="view"><div id="historicalCards"></div></section><section id="leaderboard" class="view"><div class="sec">Coach Leaderboard</div><div id="leader"></div></section><section id="data" class="view"><div class="dataPanel"><h2>Data source</h2><p>Paste a public Google Sheet URL once. The last good snapshot stays visible while the latest sheet refreshes.</p><div class="sourceBox"><label>Public Google Sheet URL</label><input id="sheetUrl" placeholder="Paste /edit, /pubhtml, /pub?output=csv, /export?format=csv, or gviz CSV URL"><div class="btnrow"><button type="button" class="btn" id="loadBtn">Load Google Sheet</button><button type="button" class="btn secondary" id="clearBtn">Clear Saved Source</button></div></div><div class="sourceBox"><label>Upload CSV file</label><input id="csvFile" type="file" accept=".csv,text/csv"><button type="button" class="btn secondary" id="fileBtn" style="width:100%;margin-top:12px">Load CSV File</button></div><div class="status" id="status">Ready.</div></div></section></div></main></div>
<script>
const TEAM_COACH={"Uzbekistan":"Bradley","Colombia":"Bradley","Jordan":"Bradley","Ghana":"Oskar","Uruguay":"Oskar","Morocco":"Oskar","Iraq":"Philip","Ivory Coast":"Philip","Scotland":"Philip","Canada":"Viv","Japan":"Viv","Germany":"Viv","Egypt":"Ben","New Zealand":"Ben","Cape Verde":"Ben","Mexico":"Sam","Bosnia and Herzegovina":"Sam","Türkiye":"Sam","Belgium":"Simone","Algeria":"Simone","Qatar":"Simone","Curaçao":"Lakshmy","Switzerland":"Lakshmy","Haiti":"Lakshmy","Spain":"Imogen","Ecuador":"Imogen","England":"Imogen","United States":"Milan","Sweden":"Milan","DR Congo":"Milan","Netherlands":"Reeva","Portugal":"Reeva","South Africa":"Reeva","Paraguay":"Grant","Austria":"Grant","Australia":"Grant","Iran":"Santi","South Korea":"Santi","France":"Santi","Saudi Arabia":"Emma","Czechia":"Emma","Argentina":"Emma","Tunisia":"Simona","Croatia":"Simona","Panama":"Simona","Brazil":"Monique","Norway":"Monique","Senegal":"Monique"};
const ISO={"Uzbekistan":"uz","Colombia":"co","Jordan":"jo","Ghana":"gh","Uruguay":"uy","Morocco":"ma","Iraq":"iq","Ivory Coast":"ci","Scotland":"gb-sct","Canada":"ca","Japan":"jp","Germany":"de","Egypt":"eg","New Zealand":"nz","Cape Verde":"cv","Mexico":"mx","Bosnia and Herzegovina":"ba","Türkiye":"tr","Belgium":"be","Algeria":"dz","Qatar":"qa","Curaçao":"cw","Switzerland":"ch","Haiti":"ht","Spain":"es","Ecuador":"ec","England":"gb-eng","United States":"us","Sweden":"se","DR Congo":"cd","Netherlands":"nl","Portugal":"pt","South Africa":"za","Paraguay":"py","Austria":"at","Australia":"au","Iran":"ir","South Korea":"kr","France":"fr","Saudi Arabia":"sa","Czechia":"cz","Argentina":"ar","Tunisia":"tn","Croatia":"hr","Panama":"pa","Brazil":"br","Norway":"no","Senegal":"sn"};
const ALIAS={"USA":"United States","USMNT":"United States","Bosnia":"Bosnia and Herzegovina","Bosnia-Herzegovina":"Bosnia and Herzegovina","Cabo Verde":"Cape Verde","Turkey":"Türkiye","Turkiye":"Türkiye","Korea Republic":"South Korea","Republic of Korea":"South Korea","Congo DR":"DR Congo","IR Iran":"Iran","Côte d'Ivoire":"Ivory Coast","Cote d'Ivoire":"Ivory Coast","Curacao":"Curaçao"};
let current=[];const required=['MatchID','DateAEST','TimeAEST','Status','Section','Stage','TeamA','TeamB','ScoreA','ScoreB'];const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
function norm(s){s=String(s??'').trim();return ALIAS[s]||s}function coach(team,explicit){return explicit||TEAM_COACH[norm(team)]||''}function flag(team,explicit){if(explicit)return explicit;const t=norm(team);return ISO[t]?`https://flagcdn.com/w160/${ISO[t]}.png`:''}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function parseCSV(text){text=text.replace(/^\ufeff/,'');const rows=[];let r=[],c='',q=false;for(let i=0;i<text.length;i++){let ch=text[i],nx=text[i+1];if(ch=='"'&&q&&nx=='"'){c+='"';i++}else if(ch=='"')q=!q;else if(ch==','&&!q){r.push(c);c=''}else if((ch=='\n'||ch=='\r')&&!q){if(c!==''||r.length){r.push(c);rows.push(r);r=[];c=''}if(ch=='\r'&&nx=='\n')i++}else c+=ch}if(c!==''||r.length){r.push(c);rows.push(r)}if(!rows.length)return[];const h=rows.shift().map(x=>x.trim());return rows.filter(x=>x.length&&x.some(v=>String(v).trim()!='')).map(x=>Object.fromEntries(h.map((k,i)=>[k,(x[i]??'').trim()]))) }
function validate(data){if(!data.length)throw new Error('CSV has no rows');let miss=required.filter(k=>!(k in data[0]));if(miss.length)throw new Error('Missing headers: '+miss.join(', '))}
function withCacheBust(url){try{const u=new URL(url);u.searchParams.set('_cb',Date.now().toString());return u.toString()}catch(e){return url+(url.includes('?')?'&':'?')+'_cb='+Date.now()}}
function buildSheetUrls(input){let raw=(input||'').trim();if(!raw)return[];const out=[];const add=u=>{u=withCacheBust(u);if(u&&!out.includes(u))out.push(u)};add(raw);if(/^[\w-]{25,}$/.test(raw)){add(`https://docs.google.com/spreadsheets/d/${raw}/gviz/tq?tqx=out:csv`);add(`https://docs.google.com/spreadsheets/d/${raw}/export?format=csv`);return out}try{const u=new URL(raw);const id=(u.pathname.match(/\/spreadsheets\/d\/([^/]+)/)||[])[1];const pubId=(u.pathname.match(/\/spreadsheets\/d\/e\/([^/]+)/)||[])[1];const gid=u.searchParams.get('gid')||(u.hash.match(/gid=([0-9]+)/)||[])[1]||'';if(raw.includes('/pubhtml')){const base=raw.replace('/pubhtml','/pub').split('#')[0];add(base.includes('?')?`${base}&output=csv`:`${base}?output=csv`);if(gid)add(base.includes('?')?`${base}&gid=${gid}&single=true&output=csv`:`${base}?gid=${gid}&single=true&output=csv`)}if(pubId&&!raw.includes('output=csv')){add(`https://docs.google.com/spreadsheets/d/e/${pubId}/pub?output=csv`);if(gid)add(`https://docs.google.com/spreadsheets/d/e/${pubId}/pub?gid=${gid}&single=true&output=csv`)}if(id){add(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv${gid?'&gid='+gid:''}`);add(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv${gid?'&gid='+gid:''}`);add(`https://docs.google.com/spreadsheets/d/${id}/pub?output=csv${gid?'&gid='+gid:''}`)}}catch(e){}return out}
async function fetchCsv(input){const urls=buildSheetUrls(input);let errors=[];for(const url of urls){try{const res=await fetch(url,{cache:'no-store'});if(!res.ok){errors.push(`${res.status} ${url}`);continue}const txt=await res.text();if(!txt.trim()||txt.trim().startsWith('<')){errors.push(`HTML/not CSV ${url}`);continue}return{txt,url}}catch(e){errors.push(`${e.message} ${url}`)}}throw new Error(`Could not load CSV. Tried ${urls.length} URL format(s). Last errors: ${errors.slice(-3).join(' | ')}`)}
function parseDateValue(d){d=String(d||'').trim();let m;if(/^\d{4}-\d{2}-\d{2}$/.test(d))return new Date(d+'T00:00:00+10:00');if((m=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)))return new Date(`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}T00:00:00+10:00`);return new Date(d)}
function parseTimeMinutes(t){t=String(t??'').trim().replace(/\s*AEST$/i,'');if(!t)return 9999;let n=Number(t);if(!Number.isNaN(n)&&t!==''&&!t.includes(':')){if(n>=0&&n<1)return Math.round(n*1440);if(n>=1&&n<24)return Math.round(n*60);if(n>=100&&n<=2359)return Math.floor(n/100)*60+(n%100)}let m=t.match(/^(\d{1,2})[:.](\d{1,2})$/);if(m)return Number(m[1])*60+Number(m[2]);m=t.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/i);if(m){let h=Number(m[1])%12;if(m[3].toLowerCase()==='pm')h+=12;return h*60+Number(m[2]||0)}return 9999}
function dateLabel(d){return parseDateValue(d).toLocaleDateString('en-AU',{weekday:'short',day:'2-digit',month:'short'})}function dateTimeValue(m){const dt=parseDateValue(m.DateAEST);const day=isNaN(dt)?8640000000000000:dt.getTime();return day+parseTimeMinutes(m.TimeAEST)*60000}function outcome(sa,sb,side){sa=Number(sa);sb=Number(sb);if(isNaN(sa)||isNaN(sb))return['',''];if(sa==sb)return['D','draw'];return((side=='A'&&sa>sb)||(side=='B'&&sb>sa))?['W','win']:['L','loss']}function setStatus(msg){const el=$('#status');if(el)el.textContent=msg}
function switchView(view){$$('.view').forEach(v=>v.classList.toggle('active',v.id===view));$$('.navBtn').forEach(b=>b.classList.toggle('active',b.dataset.view===view));window.scrollTo({top:0,behavior:'smooth'})}function flagNode(team,explicit){const f=flag(team,explicit);return f?`<img class="flag" crossorigin="anonymous" src="${esc(f)}">`:`<div class="tbdFlag">TBD</div>`}
function sweepSort(a,b){const rank=m=>{const st=(m.Status||'').toUpperCase();if(st==='LIVE')return 0;if(m.Section==='Sweepstake')return 1;if(m.Section==='Upcoming')return 2;return 9};const ra=rank(a),rb=rank(b);if(ra!==rb)return ra-rb;return dateTimeValue(a)-dateTimeValue(b)}function historySort(a,b){return dateTimeValue(b)-dateTimeValue(a)}
function renderCards(data,target,filterFn,mode='normal'){let filtered=data.filter(filterFn);if(mode==='sweep')filtered.sort(sweepSort);else if(mode==='history')filtered.sort(historySort);else filtered.sort((a,b)=>dateTimeValue(a)-dateTimeValue(b));let groups={};for(let m of filtered){let key=(m.Stage||'Fixtures')+'|'+m.DateAEST;(groups[key]??=[]).push(m)}let html='',last='';for(let key of Object.keys(groups)){let[stage,date]=key.split('|'),arr=groups[key];if(stage!==last){html+=`<div class="sec">${esc(stage)}</div>`;last=stage}html+=`<section><div class="datebar"><b>${dateLabel(date)}</b><span>${arr.length} matches</span></div>`;for(let m of arr){let st=(m.Status||'SCHEDULED').toUpperCase();let showScore=['FINAL','LIVE'].includes(st)&&m.ScoreA!==''&&m.ScoreB!=='';let showResult=st==='FINAL'&&m.ScoreA!==''&&m.ScoreB!=='';let ca=coach(m.TeamA,m.CoachA),cb=coach(m.TeamB,m.CoachB);let[oa,ocla]=outcome(m.ScoreA,m.ScoreB,'A'),[ob,oclb]=outcome(m.ScoreA,m.ScoreB,'B');html+=`<article class="card"><div class="time">${esc(m.TimeAEST)} AEST</div><div class="tag ${st}">${esc(st)}</div><div class="side">${flagNode(m.TeamA,m.FlagA)}<div><div class="team">${esc(norm(m.TeamA))}</div><div class="coach">${esc(ca)}</div>${showResult?`<div class="result ${ocla}">${oa}</div>`:''}</div></div><div class="score ${st==='FINAL'?'final':st==='LIVE'?'live':''}">${showScore?esc(m.ScoreA)+'–'+esc(m.ScoreB):'VS'}</div><div class="side right">${flagNode(m.TeamB,m.FlagB)}<div><div class="team">${esc(norm(m.TeamB))}</div><div class="coach">${esc(cb)}</div>${showResult?`<div class="result ${oclb}">${ob}</div>`:''}</div></div></article>`}html+='</section>'}$(target).innerHTML=html||'<div class="placeholder">No matches loaded. Open Data and add a public Google Sheet or CSV.</div>'}
function renderLeader(data){let s={};for(let m of data){if((m.Status||'').toUpperCase()!=='FINAL'||m.ScoreA===''||m.ScoreB==='')continue;let a=Number(m.ScoreA),b=Number(m.ScoreB);[[coach(m.TeamA,m.CoachA),a,b],[coach(m.TeamB,m.CoachB),b,a]].forEach(([c,gf,ga])=>{if(!c)return;s[c]??={p:0,w:0,d:0,l:0,gf:0,ga:0};s[c].gf+=gf;s[c].ga+=ga;if(gf>ga){s[c].p+=3;s[c].w++}else if(gf===ga){s[c].p++;s[c].d++}else s[c].l++})}let ord=Object.entries(s).sort((a,b)=>b[1].p-a[1].p||(b[1].gf-b[1].ga)-(a[1].gf-a[1].ga)||b[1].gf-a[1].gf);let html='<div class="leaderHeader"><span>Coach</span><span>Pts</span><span>W</span><span>D</span><span>L</span><span>GD</span></div>';html+=ord.map(([name,x],i)=>`<div class="leaderRow"><div class="rank"><span class="rankBadge">${i+1}</span><span class="coachName">${esc(name)}</span></div><div class="pts">${x.p}</div><div>${x.w}</div><div>${x.d}</div><div>${x.l}</div><div>${x.gf-x.ga}</div></div>`).join('');$('#leader').innerHTML=html||'<div class="placeholder">No final results loaded.</div>'}
function render(){let data=[...current];renderCards(data,'#sweepstakeCards',m=>m.Section==='Sweepstake'||m.Section==='Upcoming','sweep');renderCards(data,'#historicalCards',m=>(m.Status||'').toUpperCase()==='FINAL','history');renderLeader(data)}
async function loadUrl(auto=false){let raw=$('#sheetUrl').value.trim()||localStorage.getItem('FWC_URL')||'';if(!raw){if(!current.length)render();return}setStatus(auto?'Refreshing latest Google Sheet…':'Fetching Google Sheet…');let{txt,url}=await fetchCsv(raw);let data=parseCSV(txt);validate(data);current=data;localStorage.setItem('FWC_URL',raw);localStorage.setItem('FWC_LAST_CSV',txt);localStorage.setItem('FWC_LAST_FETCH',new Date().toISOString());render();setStatus(`Loaded latest sheet: ${new Date().toLocaleTimeString()} via ${url}`);if(!auto)switchView('sweepstake')}
function loadCachedCsv(){const txt=localStorage.getItem('FWC_LAST_CSV');if(!txt)return false;try{const data=parseCSV(txt);validate(data);current=data;render();return true}catch(e){return false}}
function wireButtons(){document.querySelector('.sideNav').addEventListener('click',e=>{const btn=e.target.closest('.navBtn');if(btn)switchView(btn.dataset.view)});$('#loadBtn').addEventListener('click',()=>loadUrl(false).catch(e=>setStatus('Load failed: '+e.message)));$('#fileBtn').addEventListener('click',async()=>{try{let f=$('#csvFile').files[0];if(!f)return setStatus('Choose a CSV file first');let txt=await f.text();let data=parseCSV(txt);validate(data);current=data;localStorage.setItem('FWC_LAST_CSV',txt);render();setStatus(`Loaded ${f.name}`);switchView('sweepstake')}catch(e){setStatus('Load failed: '+e.message)}});$('#clearBtn').addEventListener('click',()=>{localStorage.removeItem('FWC_URL');localStorage.removeItem('FWC_LAST_CSV');localStorage.removeItem('FWC_LAST_FETCH');current=[];render();setStatus('Saved source cleared.');switchView('data')});let saved=localStorage.getItem('FWC_URL');if(saved)$('#sheetUrl').value=saved;const hadCache=loadCachedCsv();if(saved){loadUrl(true).catch(e=>{setStatus('Auto-refresh failed: '+e.message+(hadCache?' Using cached sheet.':' Open Data and check the URL.')); if(!hadCache){current=[];render();}})}else if(!hadCache){current=[];render();switchView('data')}}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',wireButtons)}else{wireButtons()}
</script></body></html>
