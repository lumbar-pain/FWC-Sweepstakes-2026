function dateLabel(d){return parseDateValue(d).toLocaleDateString('en-AU',{weekday:'short',day:'2-digit',month:'short'})}function dateTimeValue(m){const dt=parseDateValue(m.DateAEST);const day=isNaN(dt)?8640000000000000:dt.getTime();return day+parseTimeMinutes(m.TimeAEST)*60000}function outcome(sa,sb,side){const a=mainScoreNumber(sa),b=mainScoreNumber(sb);if(isNaN(a)||isNaN(b))return['',''];if(a>b)return side==='A'?['W','win']:['L','loss'];if(b>a)return side==='B'?['W','win']:['L','loss'];const pa=penaltyScoreNumber(sa),pb=penaltyScoreNumber(sb);if(!isNaN(pa)&&!isNaN(pb)&&pa!==pb)return ((side==='A'&&pa>pb)||(side==='B'&&pb>pa))?['W','win']:['L','loss'];return['D','draw']}
function switchView(view){$$('.view').forEach(v=>v.classList.toggle('active',v.id===view));$$('.navBtn').forEach(b=>b.classList.toggle('active',b.dataset.view===view));window.scrollTo({top:0,behavior:'smooth'})}function flagNode(team,explicit){const f=flag(team,explicit);return f?`<img class="flag" crossorigin="anonymous" src="${esc(f)}">`:`<div class="tbdFlag">TBD</div>`}
function sweepSort(a,b){const rank=m=>{const st=(m.Status||'').toUpperCase();if(st==='LIVE')return 0;if(m.Section==='Sweepstake')return 1;if(m.Section==='Upcoming')return 2;return 9};const ra=rank(a),rb=rank(b);if(ra!==rb)return ra-rb;return dateTimeValue(a)-dateTimeValue(b)}function historySort(a,b){return dateTimeValue(b)-dateTimeValue(a)}
function renderCards(data,target,filterFn,mode='normal'){let filtered=data.filter(filterFn);if(mode==='sweep')filtered.sort(sweepSort);else if(mode==='history')filtered.sort(historySort);else filtered.sort((a,b)=>dateTimeValue(a)-dateTimeValue(b));let groups={};for(let m of filtered){let key=(m.Stage||'Fixtures')+'|'+m.DateAEST;(groups[key]??=[]).push(m)}let html='',last='';for(let key of Object.keys(groups)){let[stage,date]=key.split('|'),arr=groups[key];if(stage!==last){html+=`<div class="sec">${esc(stage)}</div>`;last=stage}html+=`<section><div class="datebar"><b>${dateLabel(date)}</b><span>${arr.length} matches</span></div>`;for(let m of arr){let st=(m.Status||'SCHEDULED').toUpperCase();let showScore=['FINAL','LIVE'].includes(st)&&m.ScoreA!==''&&m.ScoreB!=='';let showResult=st==='FINAL'&&m.ScoreA!==''&&m.ScoreB!=='';let ca=coach(m.TeamA,m.CoachA),cb=coach(m.TeamB,m.CoachB);let[oa,ocla]=outcome(m.ScoreA,m.ScoreB,'A'),[ob,oclb]=outcome(m.ScoreA,m.ScoreB,'B');let sp=showScore?scoreParts(m.ScoreA,m.ScoreB):{main:'VS',pens:''};html+=`<article class="card"><div class="time">${esc(m.TimeAEST)} AEST</div><div class="tag ${st}">${esc(st==='FINAL'?'FULL TIME':st)}</div><div class="side">${flagNode(m.TeamA,m.FlagA)}<div><div class="team">${esc(norm(m.TeamA))}</div><div class="coach">${esc(ca)}</div>${showResult?`<div class="result ${ocla}">${oa}</div>`:''}</div></div><div class="scoreWrap"><div class="score ${st==='FINAL'?'final':st==='LIVE'?'live':''}">${sp.main}</div>${sp.pens?`<div class="penLabel">Penalties</div><div class="pensScore">${sp.pens}</div>`:''}</div><div class="side right">${flagNode(m.TeamB,m.FlagB)}<div><div class="team">${esc(norm(m.TeamB))}</div><div class="coach">${esc(cb)}</div>${showResult?`<div class="result ${oclb}">${ob}</div>`:''}</div></div></article>`}html+='</section>'}$(target).innerHTML=html||'<div class="placeholder">No matches loaded. Set DEFAULT_SHEET_URL or open with ?sheet=...</div>'}
const PLACE_RANK={FIRST:1,SECOND:2,THIRD:3};
function placementDataFromSheet(){
  const byTeam=new Map(),byCoach=new Map();
  for(const row of teamControlRows){
    const place=String(row.PLACE||row.Place||row.place||'').trim().toUpperCase();
    const rank=PLACE_RANK[place];
    if(!rank)continue;
    const team=norm(row.Team||row.TeamA||row.EliminatedTeam||'');
    if(!team)continue;
    const coachName=coach(team,row.Coach||row.CoachName||'');
    const entry={place,rank,team,coach:coachName};
    const priorTeam=byTeam.get(team);
    if(!priorTeam||rank<priorTeam.rank)byTeam.set(team,entry);
    if(coachName){
      const priorCoach=byCoach.get(coachName);
      if(!priorCoach||rank<priorCoach.rank)byCoach.set(coachName,entry);
    }
  }
  return {byTeam,byCoach};
}
function placeMedalMarkup(entry,cls='placeMedal'){
  return entry?`<span class="${cls} medal-${entry.rank}" title="${esc(entry.place)} place: ${esc(entry.team)}" aria-label="${esc(entry.place)} place medal">${entry.rank}</span>`:'';
}
function renderLeader(data){
  let s={};
  const placements=placementDataFromSheet();
  const isGroupStage=m=>String(m.Stage||'').trim().toUpperCase()==='GROUP STAGE';
  const parseMain=v=>mainScoreNumber(v);
  const parsePen=v=>penaltyScoreNumber(v);
  const resultFor=(aMain,bMain,aPen,bPen,side)=>{
    if(aMain>bMain)return side==='A'?'W':'L';
    if(bMain>aMain)return side==='B'?'W':'L';
    if(!Number.isNaN(aPen)&&!Number.isNaN(bPen)&&aPen!==bPen)return ((side==='A'&&aPen>bPen)||(side==='B'&&bPen>aPen))?'W':'L';
    return 'D';
  };
  for(let m of data){
    if((m.Status||'').toUpperCase()!=='FINAL'||m.ScoreA===''||m.ScoreB==='')continue;
    const aMain=parseMain(m.ScoreA),bMain=parseMain(m.ScoreB);
    if(Number.isNaN(aMain)||Number.isNaN(bMain))continue;
    const aPen=parsePen(m.ScoreA),bPen=parsePen(m.ScoreB),groupStage=isGroupStage(m);
    [[coach(m.TeamA,m.CoachA),'A',aMain,bMain],[coach(m.TeamB,m.CoachB),'B',bMain,aMain]].forEach(([c,side,gf,ga])=>{
      if(!c)return;
      s[c]??={gp:0,w:0,d:0,l:0,gf:0,ga:0};
      s[c].gf+=gf;s[c].ga+=ga;
      const r=resultFor(aMain,bMain,aPen,bPen,side);
      if(r==='W'){s[c].w++;if(groupStage)s[c].gp+=3;}
      else if(r==='D'){s[c].d++;if(groupStage)s[c].gp++;}
      else s[c].l++;
    });
  }
  let ord=Object.entries(s).sort((a,b)=>{
    const pa=placements.byCoach.get(a[0]),pb=placements.byCoach.get(b[0]);
    const ra=pa?pa.rank:99,rb=pb?pb.rank:99;
    return ra-rb||b[1].w-a[1].w||(b[1].gf-b[1].ga)-(a[1].gf-a[1].ga)||b[1].gf-a[1].gf||b[1].gp-a[1].gp||a[0].localeCompare(b[0]);
  });
  let html='<div class="leaderHeader"><span>Coach</span><span>Total Wins</span><span>D</span><span>L</span><span>GD</span><span>Group Pts</span></div>';
  html+=ord.map(([name,x],i)=>{const place=placements.byCoach.get(name);return `<div class="leaderRow ${place?`placed place-${place.rank}`:''}"><div class="rank"><span class="rankBadge">${i+1}</span><span class="coachName">${esc(name)}${placeMedalMarkup(place)}</span></div><div class="pts">${x.w}</div><div>${x.d}</div><div>${x.l}</div><div>${x.gf-x.ga}</div><div>${x.gp}</div></div>`}).join('');
  $('#leader').innerHTML=html||'<div class="placeholder">No final results loaded.</div>';
}
function teamStateMapFromSheet(){
  const state=new Map();
  const eliminatedValues=['ELIMINATED','OUT','YES','TRUE','1','Y'];
  const advancedValues=['ADVANCED','QUALIFIED','THROUGH','ROUND OF 32','ROUND 32','R32','LAST 32','ROUND OF 16','ROUND 16','R16','LAST 16','QUARTER','QUARTERS','QUARTER FINAL','QUARTER-FINAL','QF','SEMI','SEMIS','SEMI FINAL','SEMI-FINAL','SF','FINAL','RUNNER UP','RUNNER-UP','WINNER'];
  const apply=(team,status)=>{
    team=norm(team);
    status=String(status||'').trim().toUpperCase();
    if(!team)return;
    if(eliminatedValues.includes(status))state.set(team,'eliminated');
    else if(advancedValues.includes(status)&&state.get(team)!=='eliminated')state.set(team,'advanced');
  };
  (ELIMINATED_TEAMS||[]).forEach(t=>state.set(norm(t),'eliminated'));
  for(const m of [...current,...teamControlRows]){
    apply(m.Team||m.EliminatedTeam,m.TeamStatus||m.EliminatedStatus||m.Eliminated);
    apply(m.TeamA,m.TeamAStatus||m.StatusA||m.EliminatedA);
    apply(m.TeamB,m.TeamBStatus||m.StatusB||m.EliminatedB);
  }
  return state;
}
function coachElimOverlayMarkup(){
  // Layer order: Layer 1 fg.svg < Layer 2 ref.svg. bg.svg removed.
  return `<div class="coachElimOverlay" aria-hidden="true"><img class="coachLayerFg" data-layer="1-fg" src="${esc(COACH_OVERLAY_ASSETS.fg)}" alt=""><img class="coachLayerRef" data-layer="2-ref" src="${esc(COACH_OVERLAY_ASSETS.ref)}" alt=""></div>`;
}
function renderTeams(){
  const states=teamStateMapFromSheet();
  const placements=placementDataFromSheet();
  const html=Object.entries(COACH_TEAMS).map(([c,teams])=>{
    const coachOut=teams.every(t=>states.get(norm(t))==='eliminated');
    return `<div class="teamCoachCard ${coachOut?'coachEliminated':''}" data-coach="${esc(c)}"><div class="teamCoachName">${esc(c)}</div><div class="teamList">${teams.map(t=>{const team=norm(t);const state=states.get(team)||'active';const place=placements.byTeam.get(team);const cls=place?'placed':state==='eliminated'?'eliminated':state==='advanced'?'advanced':'';const title=place?`${place.place} place`:state==='eliminated'?'Eliminated':state==='advanced'?'Advanced':'Active';return `<div class="teamPill ${cls}" title="${esc(title)}"><img src="${esc(flag(team,''))}" crossorigin="anonymous"><span>${esc(team)}</span>${placeMedalMarkup(place,'teamPlaceMedal')}</div>`}).join('')}</div>${coachOut?coachElimOverlayMarkup():''}</div>`;
  }).join('');
  $('#teamsGrid').innerHTML=`<div class="teamsGrid">${html}</div>`;
}
function render(){let data=[...current];renderCards(data,'#sweepstakeCards',m=>m.Section==='Sweepstake'||m.Section==='Upcoming','sweep');renderCards(data,'#historicalCards',m=>(m.Status||'').toUpperCase()==='FINAL','history');renderLeader(data);renderTeams()}
function sourceFromQuery(){const p=new URLSearchParams(location.search);return p.get('sheet')||p.get('csv')||''}
function teamControlSourceFromQuery(){const p=new URLSearchParams(location.search);return p.get('teamsheet')||p.get('teamcsv')||''}
function getSourceUrl(){return localStorage.getItem('FWC_URL')||sourceFromQuery()||DEFAULT_SHEET_URL||''}
function getTeamControlSourceUrl(){return localStorage.getItem('FWC_TEAM_CONTROL_URL')||teamControlSourceFromQuery()||DEFAULT_TEAM_CONTROL_URL||''}
async function loadUrl(auto=false){let raw=getSourceUrl();if(!raw){if(!current.length)render();return}let{txt}=await fetchCsv(raw);let data=parseCSV(txt);validate(data);current=data;localStorage.setItem('FWC_URL',raw);localStorage.setItem('FWC_LAST_CSV',txt);localStorage.setItem('FWC_LAST_FETCH',new Date().toISOString());render()}
function loadCachedCsv(){const txt=localStorage.getItem('FWC_LAST_CSV');if(!txt)return false;try{const data=parseCSV(txt);validate(data);current=data;render();return true}catch(e){return false}}
async function loadTeamControlUrl(){
  const raw=getTeamControlSourceUrl();
  if(!raw)return false;
  const {txt}=await fetchCsv(raw);
  const rows=parseCSV(txt);
  teamControlRows=rows;
  localStorage.setItem('FWC_TEAM_CONTROL_URL',raw);
  localStorage.setItem('FWC_TEAM_CONTROL_CSV',txt);
  localStorage.setItem('FWC_TEAM_CONTROL_FETCH',new Date().toISOString());
  render();
  return true;
}
function loadCachedTeamControlCsv(){
  const txt=localStorage.getItem('FWC_TEAM_CONTROL_CSV');
  if(!txt)return false;
  try{teamControlRows=parseCSV(txt);render();return true}catch(e){return false}
}
function wireButtons(){
  document.querySelector('.sideNav').addEventListener('click',e=>{const btn=e.target.closest('.navBtn');if(btn)switchView(btn.dataset.view)});
  let src=getSourceUrl();
  const hadCache=loadCachedCsv();
  const hadTeamCache=loadCachedTeamControlCsv();
  if(src){loadUrl(true).catch(e=>{if(!hadCache){current=[];render();}})}else if(!hadCache){current=[];render();}
  if(getTeamControlSourceUrl()){loadTeamControlUrl().catch(e=>{if(!hadTeamCache){teamControlRows=[];render();}})}
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',wireButtons)}else{wireButtons()}
</script></body></html>
