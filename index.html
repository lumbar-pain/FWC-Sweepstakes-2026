].ga)-(a[1].gf-a[1].ga)||b[1].gf-a[1].gf);let html='<div class="leaderHeader"><span>Coach</span><span>Pts</span><span>W</span><span>D</span><span>L</span><span>GD</span></div>';html+=ord.map(([name,x],i)=>`<div class=leaderRow><div class=rank><span class=rankBadge>${i+1}</span><span class=coachName>${esc(name)}</span></div><div class=pts>${x.p}</div><div>${x.w}</div><div>${x.d}</div><div>${x.l}</div><div>${x.gf-x.ga}</div></div>`).join('');$('#leader').innerHTML=html}async function loadUrl(){let raw=$('#sheetUrl').value.trim();if(!raw){current=EMBEDDED;render();return}let url=gsUrl(raw);setStatus('Fetching public Google Sheet…');let res=await fetch(url,{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);let txt=await res.text();if(txt.trim().startsWith('<'))throw new Error('URL returned HTML, not CSV. Make sure the sheet is public/shared or use a published CSV URL.');let data=parseCSV(txt);validate(data);current=data;localStorage.setItem('FWC_URL',raw);render();setStatus(`Loaded ${data.length} rows from Google Sheet at ${new Date().toLocaleTimeString()}`);switchView('matchups')}$$('.navBtn').forEach(b=>b.onclick=()=>switchView(b.dataset.view));$('#loadBtn').onclick=()=>loadUrl().catch(e=>setStatus('Load failed: '+e.message));$('#fileBtn').onclick=async()=>{let f=$('#csvFile').files[0];if(!f)return setStatus('Choose a CSV file first');let data=parseCSV(await f.text());validate(data);current=data;render();setStatus(`Loaded ${data.length} rows from ${f.name}`);switchView('matchups')};$('#resetBtn').onclick=()=>{current=EMBEDDED;render();setStatus('Reset to embedded starter data')};let saved=localStorage.getItem('FWC_URL');if(saved)$('#sheetUrl').value=saved;render();
